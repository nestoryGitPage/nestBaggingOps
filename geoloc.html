<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Attendance Portal</title>
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .attendance-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 380px; text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; font-size: 16px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 5px; font-size: 16px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .btn-primary { background: #007bff; color: white; }
        .btn-success { background: #28a745; color: white; display: none; margin-top: 10px; }
        #status-msg { margin-top: 15px; font-size: 14px; min-height: 20px; }
        .error { color: #d9534f; font-weight: bold; }
        .success { color: #28a745; font-weight: bold; }
    </style>
</head>
<body>

<div class="attendance-card">
    <h2>Attendance Portal</h2>
    
    <input type="text" id="empID" placeholder="Enter Employee ID">
    
    <button id="verifyBtn" class="btn btn-primary" onclick="startVerification()">Verify Location & ID</button>
    
    <!-- This button only appears if location and ID are both valid -->
    <button id="signInBtn" class="btn btn-success" onclick="recordAttendance()">Submit Attendance</button>

    <div id="status-msg"></div>
</div>

<script>
    // 1. Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyD3z31oVHe-yJGZ7t48QCBULTSMhXOpIw0",
        authDomain: "nestounused2.firebaseapp.com",
        databaseURL: "https://nestounused2-default-rtdb.firebaseio.com",
        projectId: "nestounused2",
        storageBucket: "nestounused2.firebasestorage.app",
        messagingSenderId: "768189081765",
        appId: "1:768189081765:web:7bf62aaf16bb713f28454c"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Constants (Your exact coordinates and 3KM radius)
    const OFFICE_LAT = -6.831589639935864;
    const OFFICE_LON = 39.28779208153666;
    const ALLOWED_RADIUS_KM = 3.0;

    let validatedEmpID = "";
    let validatedEmpName = "";

    const statusEl = document.getElementById('status-msg');
    const signInBtn = document.getElementById('signInBtn');
    const verifyBtn = document.getElementById('verifyBtn');

    // Haversine distance calculator
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; // Radius of the earth in km
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c; 
    }

    async function startVerification() {
        const inputID = document.getElementById('empID').value.trim();
        if(!inputID) return alert("Please enter your Employee ID first.");

        statusEl.className = "";
        statusEl.innerText = "Checking Location...";

        // Step 1: Check Geolocation
        navigator.geolocation.getCurrentPosition(async (pos) => {
            const userLat = pos.coords.latitude;
            const userLon = pos.coords.longitude;

            const distance = getDistance(userLat, userLon, OFFICE_LAT, OFFICE_LON);

            if (distance > ALLOWED_RADIUS_KM) {
                statusEl.className = "error";
                statusEl.innerText = `REJECTED: You are outside the 3KM office zone (${distance.toFixed(2)} km away).`;
                return;
            }

            // Step 2: Strict ID Verification from Firebase
            statusEl.innerText = "Verifying ID...";
            const snapshot = await db.ref('Employees/' + inputID).once('value');

            if (snapshot.exists()) {
                // SUCCESS: Valid ID and Valid Location
                validatedEmpID = inputID;
                validatedEmpName = snapshot.val();
                
                statusEl.className = "success";
                statusEl.innerHTML = `Welcome, ${validatedEmpName}!<br>Location verified. Press below to sign in/out.`;
                
                // Show the attendance button and hide verify
                verifyBtn.style.display = 'none';
                signInBtn.style.display = 'block';
                document.getElementById('empID').disabled = true;

            } else {
                // REJECTED: ID doesn't exist in Firebase
                statusEl.className = "error";
                statusEl.innerText = "REJECTED: Invalid Employee ID. Access Denied.";
            }

        }, (err) => {
            statusEl.className = "error";
            statusEl.innerText = "Error: Location access denied. Please enable GPS.";
        }, { enableHighAccuracy: true });
    }

    function recordAttendance() {
        const now = new Date();
        const dateKey = now.toISOString().split('T')[0]; // YYYY-MM-DD
        const timeStr = now.toLocaleTimeString();
        
        const attendRef = db.ref(`Attendance/${dateKey}/${validatedEmpID}`);

        attendRef.once('value').then(snap => {
            if (!snap.exists()) {
                // First action of the day: Sign In
                attendRef.set({
                    name: validatedEmpName,
                    signIn: timeStr,
                    signOut: "--",
                    status: "Present"
                }).then(() => {
                    alert(`Checked In Successfully at ${timeStr}`);
                    location.reload();
                });
            } else {
                // Second action: Sign Out
                attendRef.update({
                    signOut: timeStr
                }).then(() => {
                    alert(`Checked Out Successfully at ${timeStr}`);
                    location.reload();
                });
            }
        });
    }
</script>

</body>
</html>
