<!DOCTYPE html>
<html>
<head>
    <title>Quick Attendance</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #eee; }
        .box { background: white; padding: 20px; border-radius: 10px; max-width: 300px; margin: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; }
        button { width: 95%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        #log { margin-top: 15px; font-size: 13px; color: #666; }
    </style>
</head>
<body>

<div class="box">
    <h3>Attendance5</h3>
    <input type="text" id="idInput" placeholder="Enter Employee ID">
    <button onclick="submitAttendance()">SUBMIT NOW</button>
    <div id="log">Status: Ready</div>
</div>

<script>
    // 1. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyD3z31oVHe-yJGZ7t48QCBULTSMhXOpIw0",
        authDomain: "nestounused2.firebaseapp.com",
        databaseURL: "https://nestounused2-default-rtdb.firebaseio.com",
        projectId: "nestounused2",
        storageBucket: "nestounused2.firebasestorage.app",
        messagingSenderId: "768189081765",
        appId: "1:768189081765:web:7bf62aaf16bb713f28454c"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const OFFICE = { lat: -6.831589, lon: 39.287792 };

    function submitAttendance() {
        const id = document.getElementById('idInput').value.trim();
        const log = document.getElementById('log');
        if(!id) return alert("Please enter ID");

        log.innerText = "Step 1: Checking Location...";
        
        // Use a timeout so it doesn't hang forever
        navigator.geolocation.getCurrentPosition((pos) => {
            log.innerText = "Step 2: Checking ID...";
            
            // 1. Check Distance (Simple Math)
            const dist = Math.sqrt(Math.pow(pos.coords.latitude - OFFICE.lat, 2) + Math.pow(pos.coords.longitude - OFFICE.lon, 2)) * 111; 
            
            if(dist > 3) { // 3 KM limit
                log.innerHTML = "<b style='color:red'>REJECTED: Too far from office.</b>";
                return;
            }

            // 2. Check Firebase ID
            db.ref('Employees/' + id).once('value', snap => {
                if(snap.exists()) {
                    const name = snap.val();
                    const now = new Date();
                    const date = now.toISOString().split('T')[0];
                    const time = now.toLocaleTimeString();

                    db.ref(`Attendance/${date}/${id}`).update({
                        name: name,
                        time: time,
                        type: "Entry/Exit"
                    }).then(() => {
                        alert("SUCCESS! Recorded at " + time);
                        location.reload();
                    });
                } else {
                    log.innerHTML = "<b style='color:red'>REJECTED: ID not found.</b>";
                }
            });

        }, (err) => {
            log.innerHTML = "<b style='color:red'>Error: Location blocked or timed out.</b>";
            alert("Please ensure GPS is ON and you are using HTTPS.");
        }, { timeout: 10000 }); // 10 second timeout
    }
</script>

</body>
</html>
